<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">ThanyaTechAI brand hero</title>
  <desc id="desc">AI solutions, Salesforce agents, intelligent automation, product innovation, and real-world impact.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F8FCFF"/>
      <stop offset="0.52" stop-color="#EEF7FF"/>
      <stop offset="1" stop-color="#F7F1FF"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#03102B"/>
      <stop offset="1" stop-color="#091D4F"/>
