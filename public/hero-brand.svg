      <stop stop-color="#FFFFFF"/>
      <stop offset="0.48" stop-color="#D9E8FF"/>
      <stop offset="1" stop-color="#66799D"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
